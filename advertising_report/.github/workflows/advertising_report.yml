name: Advertising Report

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r advertising_report/requirements.txt

      - name: Build advertising report
        run: |
          cd advertising_report
          python src/advertising_report.py --data data/ads_daily.csv --output-dir reports
