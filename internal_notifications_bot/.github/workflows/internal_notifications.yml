name: internal-notifications-demo

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

jobs:
  notifications:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r internal_notifications_bot/requirements.txt

      - name: Build notification summary
        run: |
          cd internal_notifications_bot
          python src/export_summary.py
